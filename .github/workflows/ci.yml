name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          # node --test runs the TypeScript test files natively (type stripping),
          # which is unflagged from Node 23.6+; 24 is the current line.
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
