<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 64 64">
  <title>pjx</title>
  <g fill="none" stroke-width="9" stroke-linecap="round" stroke-linejoin="round">
    <!-- P, top loop -->
    <path d="M20 28 V8 H30 a10 10 0 0 1 0 20 H20" stroke="#FF2E93"/>
    <!-- J below P, shortened upper body; together they read like an angular 8 -->
    <path d="M42 44 V53 a10 10 0 0 1 -20 0" stroke="#3B5BDB"/>
    <!-- lowercase x to the right of J -->
    <path d="M46 46 l8 8 M54 46 l-8 8" stroke="#0CA678" stroke-width="6"/>
  </g>
</svg>
