<div class="page" id="{{ id }}">
  <header id="app-navbar" class="navbar">
    <div class="nav-left">
      <PJXButton variant="ghost" 
        start="
          <PJXIcon name='menu'/>
        " data-sidebar-toggle="true" aria-label="{{ t.toggle_sidebar }}"/>
      <Logo/>
    </div>
    <nav class="nav-center">
      <DomainTabs id="domain-tabs" route="{{ route }}"/>
      <SearchBox/>
    </nav>
    <div class="nav-right">
      <AccountMenu/>
    </div>
  </header>
  <div class="app-main">
    <aside id="sidebar" class="sidebar">
      <SidebarShell id="sidebar-shell" route="{{ route }}" conversation="{{ conversation }}" org_section="{{ org_section }}" library_file="{{ library_file }}"/>
    </aside>
    <main id="app-content" class="desktop">
      <DesktopShell id="desktop-shell" route="{{ route }}" conversation="{{ conversation }}"/>
    </main>
  </div>
</div>
