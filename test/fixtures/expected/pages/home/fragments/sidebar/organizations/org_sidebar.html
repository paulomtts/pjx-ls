<div id="{{ id }}" class="sidebar-pane">
  <div class="sidebar-zone sidebar-zone--top">
    <PJXButton variant="secondary" block="true" id="org-invite-button" 
      start="
        <PJXIcon name='plus'/>
      " center="{{ t.invite }}" hx-get="/orgs/invite" hx-target="#desktop-shell" hx-swap="innerHTML"/>
  </div>
  <PJXDivider/>
  <div class="sidebar-zone sidebar-zone--middle">
    <PJXAccordion label="{{ t.administration }}">
      <SidebarItem 
      start="
        <PJXIcon name='layout-dashboard' size='16'/>
      " center="{{ t.overview }}" active="{{ 'true' if section == 'overview' else 'false' }}" hx-get="/orgs/sections/overview" hx-swap="none" hx-push-url="/?route=organizations&section=overview"/>
      <SidebarItem 
      start="
        <PJXIcon name='settings' size='16'/>
      " center="{{ t.organization }}" active="{{ 'true' if section == 'organization' else 'false' }}" hx-get="/orgs/sections/organization" hx-swap="none" hx-push-url="/?route=organizations&section=organization"/>
      <SidebarItem 
      start="
        <PJXIcon name='users' size='16'/>
      " center="{{ t.teams }}" 
        end="
          <PJXBadge label='5' color='neutral' shape='full'/>
        " active="{{ 'true' if section == 'teams' else 'false' }}" hx-get="/orgs/sections/teams" hx-swap="none" hx-push-url="/?route=organizations&section=teams"/>
      <SidebarItem 
      start="
        <PJXIcon name='user' size='16'/>
      " center="{{ t.members }}" 
        end="
          <PJXBadge label='12' color='neutral' shape='full'/>
        " active="{{ 'true' if section == 'members' else 'false' }}" hx-get="/orgs/sections/members" hx-swap="none" hx-push-url="/?route=organizations&section=members"/>
      <SidebarItem 
      start="
        <PJXIcon name='mail' size='16'/>
      " center="{{ t.invites }}" 
        end="
          <PJXBadge label='2' color='neutral' shape='full'/>
        " active="{{ 'true' if section == 'invites' else 'false' }}" hx-get="/orgs/sections/invites" hx-swap="none" hx-push-url="/?route=organizations&section=invites"/>
      <SidebarItem 
      start="
        <PJXIcon name='clock' size='16'/>
      " center="{{ t.activity }}" active="{{ 'true' if section == 'activity' else 'false' }}" hx-get="/orgs/sections/activity" hx-swap="none" hx-push-url="/?route=organizations&section=activity"/>
      <SidebarItem 
      start="
        <PJXIcon name='brain' size='16'/>
      " center="{{ t.audit }}" active="{{ 'true' if section == 'audit' else 'false' }}" hx-get="/orgs/sections/audit" hx-swap="none" hx-push-url="/?route=organizations&section=audit"/>
    </PJXAccordion>
  </div>
  <PJXDivider/>
  <div class="sidebar-zone sidebar-zone--bottom">
    <PJXButton variant="danger" block="true" id="org-danger-button" 
      start="
        <PJXIcon name='triangle-alert'/>
      " center="{{ t.danger_zone }}" hx-get="/orgs/danger" hx-target="#desktop-shell" hx-swap="innerHTML"/>
  </div>
</div>
