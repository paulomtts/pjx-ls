<div id="{{ id }}" class="sidebar-pane">
  <div class="sidebar-zone sidebar-zone--top">
    <PJXButton variant="secondary" block="true" id="new-conversation-button" 
      start="
        <PJXIcon name='plus'/>
      " center="{{ t.new_conversation }}" hx-post="/chat/conversations" hx-swap="none"/>
  </div>
  <PJXDivider/>
  <div class="sidebar-zone sidebar-zone--middle">
    {% for group, items in groups or active_groups() %}
      <PJXAccordion label="{{ t[group] }}">
        {% for item in items %}
          <ConversationItem conversation="{{ item.id }}" title="{{ item.title }}" active="{{ 'true' if view != 'trash' and conversation == item.id else 'false' }}"/>
        {% endfor %}
      </PJXAccordion>
    {% endfor %}
  </div>
  <PJXDivider/>
  <div class="sidebar-zone sidebar-zone--bottom">
    <PJXButton variant="danger" block="true" id="trash-button" 
      start="
        <PJXIcon name='trash-2'/>
      " center="{{ t.trash }}" hx-get="/chat/trash" hx-swap="none"/>
  </div>
</div>
