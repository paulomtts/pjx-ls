<div id="{{ id }}" class="sidebar-pane">
  <div class="sidebar-zone sidebar-zone--top">
    <PJXButton variant="secondary" block="true" id="new-document-button" 
      start="
        <PJXIcon name='plus'/>
      " center="{{ t.new_document }}" hx-post="/documents" hx-target="#desktop-shell" hx-swap="innerHTML"/>
  </div>
  <PJXDivider/>
  <div class="sidebar-zone sidebar-zone--middle">
    <div class="library-tree" id="library-tree">
      <PJXAccordion 
      header="
        <PJXIcon name='folder' class_name='folder-icon'/>
        <span class='folder-name'>Projetos</span>
        <PJXBadge label='2' color='neutral' shape='full' class_name='folder-count'/>
      " data-folder-id="1">
        <SidebarItem 
        start="
          <PJXIcon name='file-text' size='16'/>
        " center="Plano de produto 2026" active="{{ 'true' if file == '101' else 'false' }}" draggable="true" data-file-id="101" hx-get="/library/files/101" hx-swap="none" hx-push-url="/?route=library&file=101"/>
        <SidebarItem 
        start="
          <PJXIcon name='file-text' size='16'/>
        " center="Roadmap Q3" active="{{ 'true' if file == '102' else 'false' }}" draggable="true" data-file-id="102" hx-get="/library/files/102" hx-swap="none" hx-push-url="/?route=library&file=102"/>
      </PJXAccordion>
      <PJXAccordion 
      header="
        <PJXIcon name='folder' class_name='folder-icon'/>
        <span class='folder-name'>Contratos</span>
        <PJXBadge label='2' color='neutral' shape='full' class_name='folder-count'/>
      " data-folder-id="2">
        <SidebarItem 
        start="
          <PJXIcon name='file-text' size='16'/>
        " center="NDA — Acme" active="{{ 'true' if file == '103' else 'false' }}" draggable="true" data-file-id="103" hx-get="/library/files/103" hx-swap="none" hx-push-url="/?route=library&file=103"/>
        <SidebarItem 
        start="
          <PJXIcon name='file-text' size='16'/>
        " center="MSA — Orbital" active="{{ 'true' if file == '104' else 'false' }}" draggable="true" data-file-id="104" hx-get="/library/files/104" hx-swap="none" hx-push-url="/?route=library&file=104"/>
      </PJXAccordion>
      <PJXAccordion 
      header="
        <PJXIcon name='folder' class_name='folder-icon'/>
        <span class='folder-name'>{{ t.no_folder }}</span>
        <PJXBadge label='1' color='neutral' shape='full' class_name='folder-count'/>
      " data-folder-id="">
        <SidebarItem 
        start="
          <PJXIcon name='file-text' size='16'/>
        " center="Notas de reunião" active="{{ 'true' if file == '105' else 'false' }}" draggable="true" data-file-id="105" hx-get="/library/files/105" hx-swap="none" hx-push-url="/?route=library&file=105"/>
      </PJXAccordion>
    </div>
  </div>
  <PJXDivider/>
  <div class="sidebar-zone sidebar-zone--bottom">
    <PJXButton variant="danger" block="true" id="library-trash-button" 
      start="
        <PJXIcon name='trash-2'/>
      " center="{{ t.trash }}" hx-get="/library/trash" hx-target="#desktop-shell" hx-swap="innerHTML"/>
  </div>
</div>
