<!DOCTYPE html>
  <html lang="{{ t.lang_code }}">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>{{ title }}</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" />
      <link rel="stylesheet" href="/static/app.css" />
      <script>(function () {
      var KEY = "sidebarOpen";
      if (localStorage.getItem(KEY) === "false") {
        document.documentElement.dataset.sidebarInitial = "closed";
      }
      function isOpen() { return localStorage.getItem(KEY) !== "false"; }
      function apply(open) {
        var sidebar = document.getElementById("sidebar");
        if (sidebar) sidebar.classList.toggle("sidebar--closed", !open);
        document.documentElement.removeAttribute("data-sidebar-initial");
      }
      document.addEventListener("click", function (event) {
        if (!event.target.closest("[data-sidebar-toggle]")) return;
        var open = !isOpen();
        localStorage.setItem(KEY, String(open));
        apply(open);
      });
      document.addEventListener("DOMContentLoaded", function () { apply(isOpen()); });
    })();</script>
      <script defer src="/static/library-dnd.js"></script>
    </head>
    <body x-data>
      <HomePage id="home-page" route="{{ route }}" conversation="{{ conversation }}" org_section="{{ org_section }}" library_file="{{ library_file }}"/>
      <PJXConfirmDialog id="confirm-dialog"/>
    </body>
  </html>
