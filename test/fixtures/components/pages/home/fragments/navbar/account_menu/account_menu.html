<PJXPopover id="account-menu" class_name="account-menu" align="end">
  <PJXPopoverTrigger class_name="account-menu__trigger" role="menu">
    <span class="account-menu__avatar" aria-hidden="true">N</span>
    <span class="account-menu__label">{{ t.account }}</span>
    <svg class="account-menu__caret" width="10" height="10" viewBox="0 0 10 10" fill="none"
         stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M2 4l3 3 3-3"/>
    </svg>
  </PJXPopoverTrigger>
  <PJXPopoverPanel class_name="account-menu__panel" role="menu">
    <button type="button" class="account-menu__item" role="menuitem">{{ t.profile }}</button>
    <button type="button" class="account-menu__item" role="menuitem">{{ t.settings }}</button>
    <hr class="account-menu__divider"/>
    <button type="button" class="account-menu__item" role="menuitem">{{ t.sign_out }}</button>
  </PJXPopoverPanel>
</PJXPopover>
