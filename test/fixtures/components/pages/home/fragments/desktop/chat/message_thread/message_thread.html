<div id="{{ id }}" class="message-list" aria-live="polite" aria-relevant="additions">{% set msgs = messages or messages_for(conversation, limit) %}{% if msgs %}{% for role, content in msgs %}<MessageBubble role="{{ role }}">{{ content | safe }}</MessageBubble>{% endfor %}{% elif empty_text %}<p class="message-list__empty">{{ empty_text }}</p>{% endif %}</div>
